<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Senhas</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--card:#1f2937;--text:#e5e7eb;--muted:#9ca3af;--accent:#22c55e;--danger:#ef4444;--warn:#f59e0b;--brand:#60a5fa;}
*{box-sizing:border-box;}

/* TRAVA A TELA PARA 100% DA ALTURA E REMOVE ROLAGEM GERAL */
html,body{
  height:100vh; 
  margin:0;
  font-family:system-ui,sans-serif;
  background:radial-gradient(1000px 600px at 10% -20%,#111827,var(--bg));
  color:var(--text);
  overflow: hidden; 
}

/* CONTAINER FLEXÍVEL PARA DISTRIBUIR O ESPAÇO VERTICAL */
.container{
  max-width:1600px;
  margin:0 auto;
  padding:20px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

header{display:flex;justify-content:space-between;align-items:center;gap:16px; flex-shrink: 0;}
.brand{display:flex;align-items:center;gap:12px;font-weight:700;}
.brand .dot{width:12px;height:12px;border-radius:999px;background:linear-gradient(135deg,var(--brand),#7dd3fc);box-shadow:0 0 12px #38bdf8;}
.card{background:linear-gradient(100deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.06);}

/* GRID REORGANIZADO: PAINEL EM CIMA, CONTROLES LADO A LADO EMBAIXO */
.grid{
  display:grid;
  grid-template-columns: 1fr 1fr; 
  grid-template-rows: auto auto; 
  gap:16px;
  flex: 1; 
  min-height: 0;
  margin-top: 16px;
}

/* PAINEL DA SENHA FICA NO TOPO E OCUPA A LARGURA TOTAL */
.display{
  grid-column: 1 / -1; 
  grid-row: 1 / 2; 
  display:flex;
  flex-direction:column;
  gap:16px;
  height: 100%;
  min-height: 0; 
}

.display .now{font-size:clamp(24px,3vw,36px);color:var(--muted);font-weight:500;letter-spacing:.04em; flex-shrink: 0; text-align: center;}

/* O CARTÃO DA SENHA CRESCE AUTOMATICAMENTE PARA PREENCHER O ESPAÇO */
.display .ticket{
  flex: 1; 
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:24px;
  padding:18px;
  min-height: 0; 
  background:radial-gradient(800px 300px at 50% -40%, rgba(96,165,250,0.2),transparent),linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.08);
}
.ticket .big{font-variant-numeric:tabular-nums;line-height:1;font-weight:650;letter-spacing:.03em;font-size:clamp(80px,12vw,150px);text-shadow:0 6px 28px rgba(96,165,250,0.35);}
.ticket .guiche{font-size:clamp(18px,2vw,28px);opacity:.9;margin-top:8px;}

/* CONTROLES (BOTÕES) NA ESQUERDA DA LINHA DE BAIXO */
.controls:nth-of-type(1) {
  grid-column: 1 / 2;
  grid-row: 2 / 3;
  display:flex;flex-direction:column;gap:8px;
}
/* CONTROLES (INPUTS) NA DIREITA DA LINHA DE BAIXO */
.controls:nth-of-type(2) {
  grid-column: 2 / 3; 
  grid-row: 2 / 3;
  display: flex;
  flex-direction: row;
  gap: 8px;
  align-self: start; 
}

.row{display:grid;grid-template-columns:1fr 2fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:14px;color:var(--muted);}
input,select{width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:#0b1221;color:var(--text);outline:none;font-size:14px;}
input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(96,165,250,0.15);}

/* BOTÕES ORGANIZADOS EM 2 COLUNAS */
.btns{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}

button{padding:10px 14px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:#101827;color:var(--text);font-weight:600;cursor:pointer; font-size: 14px;}
button.primary{background:linear-gradient(135deg,#22c55e,#16a34a);border-color:rgba(34,197,94,0.6);}
button.warn{background:linear-gradient(135deg,#f59e0b,#d97706);border-color:rgba(245,158,11,0.6);}
button.danger{background:linear-gradient(135deg,#ef4444,#dc2626);border-color:rgba(239,68,68,0.6);}
button.ghost{background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));}
button:active{transform:translateY(1px);}
button:disabled{opacity:0.5;cursor:not-allowed;}

/* RODAPÉ */
footer { margin-top:16px; display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:13px; flex-shrink: 0; }

.banner {
  width: 600px; 
  height: 100px; 
  background-image: url('https://raw.githubusercontent.com/dividacm/senha/refs/heads/main/logo.png');
  background-size: contain; 
  background-repeat: no-repeat; 
  background-position: center;
}

kbd{background:#0b1221;border:1px solid rgba(255,255,255,0.12);padding:2px 6px;border-radius:6px;font-size:12px;}

/* HISTÓRICO - PADRÃO (CONTROLADOR) */
.history-panel{display: flex;flex-direction: column;flex: 1;min-height: 0;margin-top:0px;}
.history-header{font-size:20px;font-weight:600;color:var(--muted);margin-bottom:12px;padding-left:4px;}
.history-list{display:flex;flex-direction:column;gap:8px;flex: 1;overflow-y:auto; }
.history-item{background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s;}
.history-item.recent{border-color:rgba(96,165,250,0.3);background:linear-gradient(180deg,rgba(96,165,250,0.08),rgba(96,165,250,0.03));}
.history-senha{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:0.02em;}
.history-info{display:flex;flex-direction:column;align-items:flex-end;gap:2px;text-align:right;}
.history-guiche{font-size:14px;color:var(--muted);}
.history-time{font-size:12px;color:#6b7280;}

.history-list::-webkit-scrollbar{width:8px;}
.history-list::-webkit-scrollbar-track{background:rgba(255,255,255,0.02);border-radius:4px;}
.history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}

@keyframes flash{
  0% { transform: scale(1); color: var(--accent); text-shadow:0 6px 28px rgba(34,197,94,0.8);}
  50% { transform: scale(1.1); color: var(--text); text-shadow:0 6px 28px rgba(96,165,250,0.35);}
  100%{ transform: scale(1); color: var(--text); text-shadow:0 6px 28px rgba(96,165,250,0.35);}
}
.ticket .big.flash, .panel-only .ticket .big.flash {animation: flash 0.6s ease-in-out;}
.setor-badge{display:inline-block;padding:6px 12px;background:var(--brand);color:#0f172a;border-radius:8px;font-weight:500;font-size:14px;margin-left:8px;}

/* ========================================================
   LAYOUT ESPECÍFICO PARA O MODO PAINEL GIGANTE (TV 32") 
   ======================================================== */
.panel-only .controls { display:none !important; }
.panel-only header .brand span { font-size: 1.5rem; opacity: .8; }
.panel-only #status { display: none; } /* Oculta status na TV */

/* Redesenho da Grid principal para TV: 2 Colunas Lado a Lado */
.panel-only .grid { display: flex; flex-direction: column; height: 100%; margin-top: 10px; }
.panel-only .display {
    display: grid;
    grid-template-columns: 2fr 1fr; /* Esquerda muito maior para a senha, direita para histórico */
    grid-template-rows: auto 1fr;
    gap: 40px;
    height: 100%;
}

.panel-only .now {
    grid-column: 1 / 2;
    grid-row: 1 / 2;
    font-size: clamp(30px, 4vw, 50px);
    text-align: center; /* Alinha o texto "Em atendimento" ao centro */
    padding-left: 0;    /* Remove o recuo lateral esquerdo antigo */
    margin-top: 20px;   /* Adiciona espaçamento superior para equilíbrio */
}

.panel-only .ticket {
    grid-column: 1 / 2;
    grid-row: 2 / 3;
    margin: 0 40px 40px 40px; /* Aplica margens iguais nas laterais para centralizar a caixa */
    text-align: center;       /* Garante que o número e o guichê fiquem perfeitamente centralizados */
}

.panel-only .ticket .big { font-size: clamp(150px, 16vw, 250px); }
.panel-only .ticket .guiche { font-size: clamp(35px, 3.5vw, 60px); color: var(--accent); font-weight: 600; margin-top: 20px;}

.panel-only .history-panel {
    display: flex !important;
    grid-column: 2 / 3;
    grid-row: 1 / 3;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    border-left: 2px solid rgba(255,255,255,0.05);
    padding: 0 0 0 30px;
    margin: 0;
}
.panel-only .history-header { font-size: 28px; margin-bottom: 24px; color: var(--text); opacity: 0.8;}
.panel-only .history-senha { font-size: 40px; }
.panel-only .history-guiche { font-size: 18px; color: var(--text); opacity: 0.9;}

/* OVERLAY PARA DESBLOQUEAR ÁUDIO NO PAINEL */
#unlock-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(15,23,42,0.95); z-index: 9999;
  display: none; flex-direction: column; justify-content: center; align-items: center;
  cursor: pointer; color: var(--text); text-align: center; backdrop-filter: blur(5px);
}
#unlock-overlay svg { width: 80px; height: 80px; color: var(--brand); margin-bottom: 20px; animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

@media(max-width:900px){
  html,body{overflow-y: auto;} 
  .grid{grid-template-columns:1fr; grid-template-rows: auto;}
  .display, .controls:nth-of-type(1), .controls:nth-of-type(2) { grid-column:auto; grid-row: auto; }
  .btns{grid-template-columns:repeat(2,1fr);} 
  
  /* Desativa painel lateral no mobile se a TV for aberta em tela pequena */
  .panel-only .display { grid-template-columns: 1fr; }
  .panel-only .history-panel { grid-column: 1 / 2; grid-row: auto; border-left: none; padding-left: 0;}
}
</style>
</head>
<body>

<div id="unlock-overlay">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
  <h1 style="font-size: 2.5rem; margin:0;">Clique na tela para ativar o Painel</h1>
  <p style="color: var(--muted); font-size: 1.2rem;">O navegador exige um clique inicial para libertar a voz.</p>
</div>

<div class="container">
<header>
  <div class="brand">
    <div class="dot"></div>
    <span>Praça de Atendimento do Município de Campo Mourão</span>
  </div>
  <div id="status" aria-live="polite" style="font-size:13px;color:var(--muted)">Conectado</div>
</header>

<main class="grid" id="main">
<section class="display">
  <div class="now">Em atendimento</div>
  <div class="ticket card">
    <div>
      <div class="big" id="senhaBig">J-000</div>
      <div class="guiche" id="guicheTxt"></div>
    </div>
  </div>
  
  <div class="history-panel" id="historyPanel" style="display:none;">
    <div class="history-header">Últimas senhas chamadas</div>
    <div class="history-list" id="historyList">
      </div>
  </div>
</section>

<aside class="controls">
 <div class="card">
 <div class="btns">
   <button class="primary" id="btnNext">Próxima senha (N)</button> 
   <button class="ghost" id="btnRepeat">Repetir (R)</button> 
   <button class="ghost" id="btnBack">Voltar (B)</button> 
   <button class="warn" id="btnReset">Resetar</button> 
   <button class="ghost" id="btnPainel">Abrir painel</button> 
   <button class="danger" id="btnClear">Zerar contador</button> 
  </div>
 </div>
</aside>

<aside class="controls"> 
 <div class="card" style="display:flex;flex-direction:column;gap:12px; flex: 1;">
  <div class="field">
    <label for="prefixSelect">Setor / Prefixo</label>
    <select id="prefixSelect">
      
      <option value="E">Setor E - Protocolo</option>
      <option value="J" selected> J - Divida Ativa</option>
     
    </select>
  </div>
  
  <div class="row"> 
   <div class="field">
    <label for="numero">Número atual</label>
    <input id="numero" type="number" min="0" value="0" />
   </div> 
   <div class="field">
    <label for="guiche">Guichê / Mesa</label>
    <input id="guiche" value="1" />
   </div> 
  </div> 
 </div>
</aside>
</main>

<footer>
  <div><span id="clock">--:--</span></div>
  <div class="banner"></div>
  <div><span id="syncInfo">Canal: Firebase</span></div>
</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, get } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCzuEqwPKGBBF_zHrsM1cxb5bvtA3wEylI",
  authDomain: "senhaatend.firebaseapp.com",
  databaseURL: "https://senhaatend-default-rtdb.firebaseio.com",
  projectId: "senhaatend",
  storageBucket: "senhaatend.firebasestorage.app",
  messagingSenderId: "466367281822",
  appId: "1:466367281822:web:6a5f46614312c33e1fd98f",
  measurementId: "G-EMTNPBVN82"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentPrefix = "J"; 
let state = {number:0, guiche:"1", ts:Date.now()};
let loaded = false;
let currentListener = null;
let history = []; 

const isPanel = new URL(location.href).searchParams.get('painel') === '1';

const el = {
  senhaBig: document.getElementById("senhaBig"),
  guicheTxt: document.getElementById("guicheTxt"),
  prefixSelect: document.getElementById("prefixSelect"),
  numero: document.getElementById("numero"),
  guiche: document.getElementById("guiche"),
  clock: document.getElementById("clock"),
  historyList: document.getElementById("historyList"),
  controls: document.querySelectorAll('.controls')
};

const pad = n=>String(n).padStart(3,"0");

const setorMessages = {
  'E': 'Dirija-se ao Protocolo',
  'J': 'Dirija-se ao mezanino',
};

// Formatação inteligente da mensagem para exibir e falar "Guichê"
function getSetorMessage(prefix, guiche){
  const baseMessage = setorMessages[prefix] || 'Dirija-se ao atendimento';
  if (!guiche) return baseMessage;
  
  // Evita redundância caso o utilizador já escreva "Guichê 1" no input
  const textoGuiche = String(guiche).toLowerCase();
  const prefixo = (textoGuiche.includes('guich') || textoGuiche.includes('mesa') || textoGuiche.includes('sala')) ? '' : 'Guichê ';
  
  return `${baseMessage}, ${prefixo}${guiche}`;
}

function renderHistory(){
  if(!el.historyList) return;
  const numItems = isPanel ? 8 : 12; // Mostra menos itens na TV para evitar overflow devido ao tamanho da fonte
  const recentHistory = history.slice(-numItems).reverse(); 
  
  el.historyList.innerHTML = recentHistory.map((item, index) => {
    const isRecent = index === 0; 
    const timeStr = new Date(item.ts).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    const mensagem = getSetorMessage(item.prefix, item.guiche);
    
    return `
      <div class="history-item ${isRecent ? 'recent' : ''}">
        <div class="history-senha">${item.prefix}-${pad(item.number)}</div>
        <div class="history-info">
          <div class="history-guiche">${mensagem}</div>
          <div class="history-time">${timeStr}</div>
        </div>
      </div>
    `;
  }).join('');
}

function updateDisplay(){
  el.senhaBig.textContent=`${currentPrefix}-${pad(state.number)}`;
  el.guicheTxt.textContent=getSetorMessage(currentPrefix, state.guiche);
  el.numero.value=state.number;
  el.guiche.value=state.guiche;

  el.senhaBig.classList.remove('flash');
  void el.senhaBig.offsetWidth;
  el.senhaBig.classList.add('flash');
  
  renderHistory();
}

function anunciarSenha() {
  const senha = `${currentPrefix}-${pad(state.number)}`;
  const mensagem = getSetorMessage(currentPrefix, state.guiche);
  const frase = `Senha ${senha}. ${mensagem}`;
  
  const msg = new SpeechSynthesisUtterance(frase);
  const vozes = window.speechSynthesis.getVoices();
  const vozFeminina = vozes.find(voz => 
    voz.lang === 'pt-BR' && 
    (voz.name.includes('Maria') || voz.name.includes('Luciana') || voz.name.includes('Google') || voz.name.includes('Feminine'))
  );

  if (vozFeminina) msg.voice = vozFeminina;
  
  msg.lang = "pt-BR";
  msg.rate = 1;
  msg.pitch = 1;
  msg.volume = 1;

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

function getStateRef(){
  return ref(db, `fila/setores/${currentPrefix}`);
}

// ==========================================
// FUNÇÕES DO PAINEL GLOBAL
// ==========================================

function dispararPainelGlobal(prefix, number, guiche, ts) {
  const globalStateRef = ref(db, 'fila/global/estado');
  runTransaction(globalStateRef, () => {
     return { prefix, number, guiche, ts };
  });

  const globalHistoryRef = ref(db, 'fila/global/historico');
  runTransaction(globalHistoryRef, (currentData) => {
     let historyData = currentData || [];
     if(!Array.isArray(historyData)) historyData = [];
     
     historyData.push({ prefix, number, guiche, ts });
     
     if(historyData.length > 30){ historyData = historyData.slice(-30); }
     return historyData;
  });
}

function loadPrefix(prefix){
  currentPrefix = prefix;
  loaded = false;
  
  if(currentListener){ currentListener(); }
  
  const stateRef = getStateRef();
  
  currentListener = onValue(stateRef, snapshot => {
    if(snapshot.exists()){
      const remote = snapshot.val();
      if(remote.ts > state.ts){ 
        Object.assign(state, remote);
        updateDisplay();
      }
    }
  });
  
  get(stateRef).then(snapshot=>{
    if(snapshot.exists()){
      state = snapshot.val();
    } else {
      state = {number:0, guiche: el.guiche.value, ts:Date.now()};
    }
    updateDisplay();
    loaded = true;
  });
}

// ==========================================
// AÇÕES DO CONTROLADOR
// ==========================================

function next(){ 
  if(!loaded) return;
  const novoTs = Date.now();
  state.ts = novoTs;
  const meuGuiche = el.guiche.value;

  runTransaction(getStateRef(), (current) => {
    let proximoNumero = 1;
    if (current && typeof current.number === 'number') { proximoNumero = current.number + 1; }
    return { number: proximoNumero, guiche: meuGuiche, ts: novoTs };
  }).then((result) => {
    if (result.committed) {
      const confirmedState = result.snapshot.val();
      state.number = confirmedState.number;
      state.guiche = confirmedState.guiche;
      
      updateDisplay();
      anunciarSenha(); 
      dispararPainelGlobal(currentPrefix, confirmedState.number, confirmedState.guiche, confirmedState.ts);
    }
  });
}

function back(){ 
  if(!loaded) return;
  const novoTs = Date.now();
  state.ts = novoTs;
  const meuGuiche = el.guiche.value;

  runTransaction(getStateRef(), (current) => {
    let novoNumero = 0;
    if (current && typeof current.number === 'number') { novoNumero = Math.max(0, current.number - 1); }
    return { number: novoNumero, guiche: meuGuiche, ts: novoTs };
  }).then((result) => {
    if (result.committed) {
      const confirmedState = result.snapshot.val();
      state.number = confirmedState.number;
      state.guiche = confirmedState.guiche;
      
      updateDisplay();
      anunciarSenha();
      dispararPainelGlobal(currentPrefix, confirmedState.number, confirmedState.guiche, confirmedState.ts);
    }
  });
}

// ==========================================
// EVENTOS DOS BOTÕES E INPUTS
// ==========================================

el.prefixSelect.addEventListener('change',()=>{ loadPrefix(el.prefixSelect.value); });

el.numero.addEventListener('change',()=>{
  state.number=parseInt(el.numero.value||0); 
  const novoTs = Date.now();
  state.ts = novoTs;
  
  runTransaction(getStateRef(), () => { return { number: state.number, guiche: state.guiche, ts: novoTs }; });
  updateDisplay();
  dispararPainelGlobal(currentPrefix, state.number, state.guiche, novoTs);
});

el.guiche.addEventListener('input',()=>{
  state.guiche=el.guiche.value; 
  const novoTs = Date.now();
  state.ts = novoTs;
  
  runTransaction(getStateRef(), () => { return { number: state.number, guiche: state.guiche, ts: novoTs }; });
  updateDisplay();
});

document.getElementById("btnNext").addEventListener('click',next);
document.getElementById("btnBack").addEventListener('click',back);

document.getElementById("btnRepeat").addEventListener('click',()=>{
  const novoTs = Date.now();
  state.ts = novoTs;
  dispararPainelGlobal(currentPrefix, state.number, state.guiche, novoTs);
  anunciarSenha();
});

document.getElementById("btnReset").addEventListener('click',()=>{
  const novoTs = Date.now();
  state.ts = novoTs;
  runTransaction(getStateRef(), () => { return { number: 0, guiche: state.guiche, ts: novoTs }; })
  .then(() => {
     state.number = 0;
     updateDisplay();
     dispararPainelGlobal(currentPrefix, 0, state.guiche, novoTs);
     anunciarSenha();
  });
});

document.getElementById("btnClear").addEventListener('click',()=>{
  if(confirm(`Tem a certeza que deseja ZERAR o contador da sala ${currentPrefix} e APAGAR O HISTÓRICO GLOBAL do Painel?`)) {
      const novoTs = Date.now();
      
      runTransaction(getStateRef(), () => { return { number: 0, guiche: el.guiche.value, ts: novoTs }; })
      .then(() => {
          state.number = 0;
          state.ts = novoTs;
          updateDisplay();
          dispararPainelGlobal(currentPrefix, 0, el.guiche.value, novoTs);
      });
      
      runTransaction(ref(db, 'fila/global/historico'), () => []); 
  }
});

document.getElementById("btnPainel").addEventListener('click',()=>{
  const url = new URL(location.href); 
  url.searchParams.set("painel","1");
  window.open(url.toString(), "_blank");
});

window.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if(e.key.toLowerCase()==='n') next();
  else if(e.key.toLowerCase()==='r') {
    const novoTs = Date.now();
    dispararPainelGlobal(currentPrefix, state.number, state.guiche, novoTs);
    anunciarSenha();
  }
  else if(e.key.toLowerCase()==='b') back();
});

setInterval(()=>{ 
  const d=new Date(); 
  el.clock.textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); 
},1000);

// ==========================================
// INICIALIZAÇÃO E LÓGICA DO PAINEL
// ==========================================

function initPanelMode(){ 
  const globalHistoryRef = ref(db, 'fila/global/historico');
  onValue(globalHistoryRef, snapshot => {
    if(snapshot.exists()){
      history = snapshot.val() || [];
      renderHistory();
    } else {
      history = [];
      renderHistory();
    }
  });

  if(isPanel){ 
    document.body.classList.add("panel-only"); 
    el.controls.forEach(ctrl => ctrl.style.display="none");
    
    const overlay = document.getElementById('unlock-overlay');
    overlay.style.display = 'flex';
    overlay.addEventListener('click', () => {
        const silentMsg = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(silentMsg);
        overlay.style.display = 'none'; 
    });
    
    const globalStateRef = ref(db, 'fila/global/estado');
    onValue(globalStateRef, snapshot => {
      if(snapshot.exists()){
        const remote = snapshot.val();
        if(remote.ts > state.ts){ 
          currentPrefix = remote.prefix;
          state.number = remote.number;
          state.guiche = remote.guiche;
          state.ts = remote.ts;
          updateDisplay();
          anunciarSenha();
        }
      }
    });
    
    get(globalStateRef).then(snapshot=>{
       if(snapshot.exists()){
           const remote = snapshot.val();
           currentPrefix = remote.prefix;
           state.number = remote.number;
           state.guiche = remote.guiche;
           state.ts = remote.ts;
           updateDisplay();
       }
    });

  } else {
    loadPrefix(currentPrefix);
  }
}

initPanelMode();
</script>
